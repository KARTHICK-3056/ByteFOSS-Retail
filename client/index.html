<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ByteFOSS Retail</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <script>
    (function () {
      try {
        var localTheme = localStorage.getItem('pos_theme');
        var theme = localTheme || 'system';
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#0a0a0a';
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.backgroundColor = '#fafafa';
        }
      } catch (e) { }
    })();
  </script>
</head>

<body class="bg-[#fafafa] dark:bg-[#0a0a0a] text-gray-900 dark:text-gray-100 font-sans antialiased overflow-hidden">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
